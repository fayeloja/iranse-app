version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: iranse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iranse_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iranse-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: iranse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - iranse-network
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  iranse-network:
    driver: bridge
